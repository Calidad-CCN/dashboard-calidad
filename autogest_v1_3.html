<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autogestión Calidad · Cruz Nacional</title>
<style>
:root {
  --cn-navy:#003366;--cn-blue:#0066CC;--cn-red:#CC0000;
  --ok:#1A7A3C;--warn:#B88A00;--crit:#CC0000;--sol:#7C3AED;
  --ok-lt:#D4EDDA;--warn-lt:#FFF3CD;--crit-lt:#F8D7DA;--sol-lt:#EDE9FE;
  --bg:#F0F4F8;--surface:#FFFFFF;--border:#D1D9E6;--text:#1A202C;--muted:#718096;
  --radius:10px;--shadow:0 2px 8px rgba(0,0,0,.08);
  --cn-navy-lt:#E8EFF8;--cn-blue-lt:#EBF4FF;
}
[data-theme="dark"]{
  --bg:#0F172A;--surface:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;
  --cn-navy-lt:#1E293B;--cn-blue-lt:#1E293B;--ok-lt:#14532D;--warn-lt:#451A03;--crit-lt:#450A0A;--sol-lt:#2E1065;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:var(--cn-navy);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:white;border-radius:16px;padding:40px;width:100%;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo{font-size:1.4rem;font-weight:900;color:var(--cn-navy);margin-bottom:4px;}
.login-sub{font-size:.78rem;color:var(--cn-red);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:24px;}
.login-title{font-size:1.1rem;font-weight:700;color:var(--cn-navy);margin-bottom:20px;}
.login-field{margin-bottom:14px;text-align:left;}
.login-field label{font-size:.78rem;font-weight:700;color:#555;display:block;margin-bottom:5px;}
.login-field input,.login-field select{width:100%;padding:10px 14px;border:1.5px solid #DDD;border-radius:8px;font-size:.9rem;outline:none;background:#FAFAFA;}
.login-field input:focus,.login-field select:focus{border-color:var(--cn-blue);}
.login-field input[disabled]{background:#F0F4F8;color:#666;cursor:not-allowed;}
.login-btn{width:100%;padding:12px;background:var(--cn-navy);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;}
.login-btn:hover{background:var(--cn-blue);}

/* HEADER */
.header{background:var(--cn-navy);color:white;padding:10px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.header-logo{height:36px;width:auto;}
.header-title{font-size:1rem;font-weight:700;flex:1;}
.header-info{font-size:.75rem;opacity:.8;text-align:right;line-height:1.5;}
.btn-theme{background:rgba(255,255,255,.15);border:none;color:white;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.75rem;}

/* TABS */
.tabs{background:var(--surface);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:4px;overflow-x:auto;}
.tab-btn{padding:12px 18px;border:none;background:none;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab-btn.active{color:var(--cn-blue);border-bottom-color:var(--cn-blue);}
.tab-panel{display:none;padding:20px;max-width:1000px;margin:0 auto;}
.tab-panel.active{display:block;}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
.card-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--cn-blue);margin-bottom:12px;}

/* PROGRESS BAR */
.progress-bar-wrap{background:var(--cn-navy);border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.progress-pct{font-size:1.5rem;font-weight:900;}
.progress-bar-bg{flex:1;min-width:120px;height:10px;background:rgba(255,255,255,.2);border-radius:5px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:5px;transition:width .3s;}
.progress-label{font-size:.78rem;color:rgba(255,255,255,.8);}

/* CHECKLIST AREAS */
.area-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.area-header{background:var(--cn-navy);color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.area-header:hover{background:var(--cn-blue);}
.area-titulo{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.area-stats{font-size:.75rem;display:flex;gap:8px;align-items:center;}
.area-pct{font-weight:800;font-size:.9rem;}
.area-body{padding:12px 16px;display:none;}
.area-body.open{display:block;}
.area-toggle{font-size:.7rem;opacity:.7;transition:transform .2s;}
.area-toggle.open{transform:rotate(180deg);}

/* ITEMS */
.item-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-txt{flex:1;font-size:.82rem;line-height:1.4;padding-top:2px;}
.item-btns{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;}
.ck-btn{padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap;}
.ck-btn:hover{opacity:.8;}
.ck-btn.active-C{background:var(--ok-lt);border-color:var(--ok);color:var(--ok);}
.ck-btn.active-N{background:var(--crit-lt);border-color:var(--crit);color:var(--crit);}
.ck-btn.active-S{background:var(--sol-lt);border-color:var(--sol);color:var(--sol);}
.ck-btn.active-A{background:var(--cn-navy-lt);border-color:var(--cn-navy);color:var(--cn-navy);}
.sol-group{width:100%;margin-top:8px;padding:10px;border:1.5px solid var(--sol);border-radius:8px;background:var(--sol-lt);display:none;}
.sol-group.visible{display:block;}
.sol-label{font-size:.68rem;font-weight:700;color:var(--sol);display:block;margin-bottom:3px;}
.sol-input{width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:.78rem;background:var(--surface);color:var(--text);outline:none;}

/* FOTOS */
.foto-wrap{margin-top:8px;padding:8px;background:var(--cn-navy-lt);border-radius:8px;}
.foto-wrap-label{font-size:.68rem;font-weight:700;color:var(--cn-blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.fotos-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.foto-thumb{width:72px;height:72px;object-fit:cover;border-radius:6px;border:2px solid var(--border);cursor:pointer;}
.foto-upload-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1.5px dashed var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:.72rem;color:var(--muted);}
.foto-upload-btn:hover{border-color:var(--cn-blue);color:var(--cn-blue);}
.foto-input{display:none;}

/* OBS AREA */
.obs-label{font-size:.72rem;font-weight:700;color:var(--cn-blue);display:block;margin-top:10px;margin-bottom:4px;}
.obs-textarea{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:.8rem;background:var(--surface);color:var(--text);outline:none;resize:vertical;min-height:52px;}
.obs-textarea:focus{border-color:var(--cn-blue);}

/* BOTONES */
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--cn-navy);color:white;}
.btn-primary:hover{background:var(--cn-blue);}
.btn-success{background:var(--ok);color:white;}
.btn-success:hover{opacity:.9;}
.btn-danger{background:#DC2626;color:white;}
.btn-secondary{background:var(--cn-navy-lt);color:var(--cn-navy);border:1.5px solid var(--border);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}

/* HISTORIAL */
.hist-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.hist-row:hover{border-color:var(--cn-blue);}
.hist-fecha{font-size:.82rem;font-weight:700;color:var(--cn-navy);}
.hist-autor{font-size:.76rem;color:var(--muted);}
.hist-pct{font-size:1.1rem;font-weight:900;margin-left:auto;}
.hist-badge{padding:3px 10px;border-radius:12px;font-size:.68rem;font-weight:700;}
.badge-ok{background:var(--ok-lt);color:var(--ok);}
.badge-warn{background:var(--warn-lt);color:var(--warn);}
.badge-crit{background:var(--crit-lt);color:var(--crit);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:var(--radius);width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-header{background:var(--cn-navy);color:white;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;}
.modal-close{background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;padding:4px 8px;}
.modal-body{padding:20px;}

/* PENDIENTES */
.pendiente-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.pendiente-txt{flex:1;font-size:.82rem;}
.pendiente-estado{padding:3px 10px;border-radius:12px;font-size:.68rem;font-weight:700;cursor:pointer;border:none;}
.p-pendiente{background:var(--crit-lt);color:var(--crit);}
.p-solicitado{background:var(--sol-lt);color:var(--sol);}
.p-resuelto{background:var(--ok-lt);color:var(--ok);}
.pendiente-input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;background:var(--surface);color:var(--text);outline:none;margin-bottom:8px;}
.pendiente-input:focus{border-color:var(--cn-blue);}
</style>
</head>

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function fmtFecha(f){
  if(!f)return'—';
  var p=f.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

function hoy(){
  return new Date().toISOString().slice(0,10);
}

function estadoClass(p){
  if(p===null)return'nd';
  if(p>=0.95)return'ok';
  if(p>=0.80)return'warn';
  return'crit';
}
function colorCls(cls){return cls==='ok'?'#1A7A3C':cls==='warn'?'#B88A00':cls==='crit'?'#CC0000':'#718096';}
function bgCls(cls){return cls==='ok'?'#D4EDDA':cls==='warn'?'#FFF3CD':cls==='crit'?'#F8D7DA':'#F0F4F8';}
function labelCls(cls){return cls==='ok'?'Óptimo':cls==='warn'?'Medio':cls==='crit'?'Bajo':'Sin datos';}
function fmtPct(p){return p===null?'—':(p*100).toFixed(1)+'%';}

function iniciarSesion(){
  var nombre=document.getElementById('loginNombre').value.trim();
  var sucursal=document.getElementById('loginSucursal').value;
  if(!nombre){alert('Ingresa tu nombre.');return;}
  if(!sucursal){alert('Selecciona una sucursal.');return;}
  SESION={nombre:nombre,sucursal:sucursal,fecha:hoy()};
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appHeader').style.display='flex';
  document.getElementById('appTabs').style.display='flex';
  document.getElementById('progressWrap').style.display='flex';
  document.getElementById('ckBtnRow').style.display='flex';
  document.getElementById('headerInfo').innerHTML=nombre+'<br><span style="opacity:.7">'+sucursal+' · '+fmtFecha(hoy())+'</span>';
  buildChecklist();
  renderHistorial();
}

// ══════════════════════════════
// SET ITEM
// ══════════════════════════════
function setCk(itemId,val,secId){
  if(GUARDADA)return;
  // Resetear botones
  ['C','N','S','A'].forEach(function(v){
    var btn=document.getElementById('ck_'+v+'_'+itemId);
    if(btn)btn.className='ck-btn';
  });
  // Activar botón
  var btn=document.getElementById('ck_'+val+'_'+itemId);
  if(btn)btn.className='ck-btn active-'+val;
  // Mostrar/ocultar botón Solicitado y grupo de campos
  var btnS=document.getElementById('ck_S_'+itemId);
  var solGroup=document.getElementById('solgroup_'+itemId);
  if(val==='N'){
    // Al marcar No Cumple, aparece el botón para escalar a "En gestión"
    if(btnS)btnS.style.display='';
    if(solGroup){
      solGroup.classList.remove('visible');
      var q=document.getElementById('solq_'+itemId),f=document.getElementById('solf_'+itemId),m=document.getElementById('solm_'+itemId);
      if(q)q.value='';if(f)f.value='';if(m)m.value='';
    }
  }else if(val==='S'){
    // Al marcar En gestión, el botón debe seguir visible y ACTIVO (no resetear su clase)
    if(btnS)btnS.style.display='';
    if(solGroup)solGroup.classList.add('visible');
  }else{
    // Cumple o N/A: ocultar y limpiar por completo la escalada a "En gestión"
    if(btnS){btnS.style.display='none';btnS.className='ck-btn';}
    if(solGroup){
      solGroup.classList.remove('visible');
      var q2=document.getElementById('solq_'+itemId),f2=document.getElementById('solf_'+itemId),m2=document.getElementById('solm_'+itemId);
      if(q2)q2.value='';if(f2)f2.value='';if(m2)m2.value='';
    }
  }
  updateAreaStats(secId);
  updateGlobal();
}

function getCkVal(itemId){
  if(document.getElementById('ck_C_'+itemId)&&document.getElementById('ck_C_'+itemId).classList.contains('active-C'))return'C';
  if(document.getElementById('ck_N_'+itemId)&&document.getElementById('ck_N_'+itemId).classList.contains('active-N'))return'N';
  if(document.getElementById('ck_S_'+itemId)&&document.getElementById('ck_S_'+itemId).classList.contains('active-S'))return'S';
  if(document.getElementById('ck_A_'+itemId)&&document.getElementById('ck_A_'+itemId).classList.contains('active-A'))return'A';
  return null;
}

// ══════════════════════════════
// STATS
// ══════════════════════════════
function updateAreaStats(secId){
  var sec=CHECKLIST_SECCIONES.find(function(s){return s.id===secId;});
  if(!sec)return;
  var c=0,n=0,s=0,a=0;
  sec.items.forEach(function(item){
    var v=getCkVal(item.id);
    if(v==='C')c++;
    else if(v==='N')n++;
    else if(v==='S')s++;
    else if(v==='A')a++;
  });
  // S cuenta como cumple para el porcentaje
  var total=c+n+s;
  var p=total>0?(c+s)/total:null;
  var cls=estadoClass(p);
  var pEl=document.getElementById('area_pct_'+secId);
  if(pEl){
    pEl.textContent=fmtPct(p);
    pEl.style.color=p===null?'white':colorCls(cls);
  }
  // Colorear header
  var header=document.querySelector('#area_'+secId+' .area-header');
  if(header){
    if(p===null)header.style.background='';

    else if(cls==='warn')header.style.background='#7A5A00';

function updateGlobal(){
  var totalC=0,totalN=0,totalS=0;
  CHECKLIST_SECCIONES.forEach(function(sec){
    sec.items.forEach(function(item){
      var v=getCkVal(item.id);
      if(v==='C')totalC++;
      else if(v==='N')totalN++;
      else if(v==='S')totalS++;
    });
  });
  var total=totalC+totalN+totalS;
  var p=total>0?(totalC+totalS)/total:null;
  var cls=estadoClass(p);
  var pEl=document.getElementById('progressPct');
  var fill=document.getElementById('progressFill');
  var lbl=document.getElementById('progressLabel');
  if(pEl)pEl.textContent=fmtPct(p);
  if(fill){fill.style.width=(p!==null?p*100:0)+'%';fill.style.background=colorCls(cls);}
  if(lbl)lbl.textContent=labelCls(cls)+' · '+totalC+' Cumple · '+totalS+' Solicitado · '+totalN+' No Cumple';
}

// ══════════════════════════════
// FOTOS
// ══════════════════════════════
function handleFoto(secId,input){
  if(!input.files||!input.files.length)return;
  if(!FOTOS[secId])FOTOS[secId]=[];
  var disp=5-FOTOS[secId].length;
  if(disp<=0){alert('Máximo 5 fotos por área.');input.value='';return;}
  Array.from(input.files).slice(0,disp).forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var cv=document.createElement('canvas');
        var mW=800,mH=600,w=img.width,h=img.height;
        if(w>mW){h=h*mW/w;w=mW;}if(h>mH){w=w*mH/h;h=mH;}
        cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        var dataURL=cv.toDataURL('image/jpeg',0.7);
        FOTOS[secId].push(dataURL);
        renderFotos(secId);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderFotos(secId){
  var grid=document.getElementById('fotos_grid_'+secId);
  var lbl=document.getElementById('foto_lbl_'+secId);
  if(!grid)return;
  var fotos=FOTOS[secId]||[];
  grid.innerHTML='';
  fotos.forEach(function(d,i){
    var img=document.createElement('img');
    img.src=d;img.className='foto-thumb';img.title='Clic para eliminar';
    (function(idx,sid){img.onclick=function(){if(confirm('¿Eliminar esta foto?')){FOTOS[sid].splice(idx,1);renderFotos(sid);}};})(i,secId);
    grid.appendChild(img);
  });
  if(lbl)lbl.style.display=fotos.length>=5?'none':'inline-flex';
}

function limpiarFotos(){
  FOTOS={};
  CHECKLIST_SECCIONES.forEach(function(sec){renderFotos(sec.id);});
}

// GUARDAR EVALUACIÓN
// ══════════════════════════════
function guardarChecklist(){
  if(!SESION){return;}
  // Validar que todos los ítems estén respondidos
  var sinResponder=[];
  var solSinDatos=[];
  CHECKLIST_SECCIONES.forEach(function(sec){
    sec.items.forEach(function(item){
      var v=getCkVal(item.id);
      if(!v) sinResponder.push(item.txt);
      if(v==='S'){
        var quien=(document.getElementById('solq_'+item.id)||{}).value||'';
        var cuando=(document.getElementById('solf_'+item.id)||{}).value||'';
        var medio=(document.getElementById('solm_'+item.id)||{}).value||'';
        if(!quien.trim()||!cuando||!medio) solSinDatos.push(item.txt);
      }
    });
  });
  if(sinResponder.length>0){
    alert('Faltan '+sinResponder.length+' ítem(s) sin responder. Debes marcar todos antes de guardar.');
    return;
  }
  if(solSinDatos.length>0){
    alert('Hay '+solSinDatos.length+' ítem(s) marcados como En gestión sin completar a quién, cuándo y por qué medio se solicitó.');
    return;
  }
  var res=generarReporteHTML();
  var registro={
    id:SESION.sucursal+'_'+SESION.fecha+'_'+Date.now(),
    nombre:SESION.nombre,
    sucursal:SESION.sucursal,
    fecha:SESION.fecha,
    pct:res.pct,
    totalC:res.totalC,totalN:res.totalN,totalS:res.totalS,
    timestamp:new Date().toISOString(),
    html:res.html
  };
  agDbPut(registro).then(function(){
    GUARDADA=true;
    // Bloquear UI
    document.querySelectorAll('.ck-btn').forEach(function(b){b.style.pointerEvents='none';b.style.opacity='.7';});
    document.querySelectorAll('.obs-textarea,.sol-input').forEach(function(el){el.disabled=true;});
    document.querySelectorAll('.foto-upload-btn').forEach(function(el){el.style.display='none';});
    alert('✅ Evaluación guardada. Ya no puede ser modificada.\n\nPuedes ver y descargar el informe desde la pestaña Historial.');
    renderHistorial();
  }).catch(function(e){
    console.error('Error guardando informe:',e);
    alert('⚠️ No se pudo guardar el informe. Verifica el espacio disponible en el dispositivo e intenta de nuevo.');
  });
}

// ══════════════════════════════
// HISTORIAL
// ══════════════════════════════
// HISTORIAL — INFORMES GUARDADOS EN INDEXEDDB
// ══════════════════════════════
// Ya no se guardan datos crudos por separado: se guarda el informe HTML final
// completo (con fotos ya incrustadas) en IndexedDB. Desde aquí solo se puede
// VER y DESCARGAR informes ya generados — nada se reconstruye ni se edita.
var AG_DB_NAME='ag_reports_db';
var AG_DB_STORE='reports';
var _agDbPromise=null;
var _ultimoInformeId=null;

function abrirAgDB(){
  if(_agDbPromise) return _agDbPromise;
  _agDbPromise=new Promise(function(resolve,reject){
    if(!window.indexedDB){reject(new Error('IndexedDB no disponible'));return;}
    var req=indexedDB.open(AG_DB_NAME,1);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains(AG_DB_STORE))db.createObjectStore(AG_DB_STORE,{keyPath:'id'});
    };
    req.onsuccess=function(e){resolve(e.target.result);};
    req.onerror=function(e){reject(e.target.error);};
  });
  return _agDbPromise;
}
function agDbPut(registro){
  return abrirAgDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(AG_DB_STORE,'readwrite');
      tx.objectStore(AG_DB_STORE).put(registro);
      tx.oncomplete=function(){resolve(true);};
      tx.onerror=function(){reject(tx.error);};
    });
  });
}
function agDbGetAll(){
  return abrirAgDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(AG_DB_STORE,'readonly');
      var req=tx.objectStore(AG_DB_STORE).getAll();
      req.onsuccess=function(){resolve(req.result||[]);};
      req.onerror=function(){reject(req.error);};
    });
  });
}
function agDbGet(id){
  return abrirAgDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(AG_DB_STORE,'readonly');
      var req=tx.objectStore(AG_DB_STORE).get(id);
      req.onsuccess=function(){resolve(req.result||null);};
      req.onerror=function(){reject(req.error);};
    });
  });
}

function renderHistorial(){
  var cont=document.getElementById('historialContainer');
  if(!SESION){return;}
  cont.innerHTML='<p style="color:var(--muted);font-size:.82rem">Cargando…</p>';
  agDbGetAll().then(function(data){
    data=data.filter(function(r){return r.sucursal===SESION.sucursal;}).sort(function(a,b){return b.timestamp.localeCompare(a.timestamp);});
    if(!data.length){cont.innerHTML='<p style="color:var(--muted);font-size:.82rem">No hay informes generados para esta sucursal en este dispositivo.</p>';return;}
    cont.innerHTML='';
    data.forEach(function(r){
      var cls=estadoClass(r.pct);
      var div=document.createElement('div');
      div.className='hist-row';
      div.innerHTML='<div><div class="hist-fecha">'+fmtFecha(r.fecha)+'</div><div class="hist-autor">Por: '+r.nombre+'</div></div>'
        +'<div style="margin-left:auto;text-align:right"><div class="hist-pct" style="color:'+colorCls(cls)+'">'+fmtPct(r.pct)+'</div>'
        +'<span class="hist-badge badge-'+cls+'">'+labelCls(cls)+'</span></div>'
        +'<div style="font-size:.75rem;color:var(--muted)">→</div>';
      div.onclick=function(){verInformeGuardado(r.id);};
      cont.appendChild(div);
    });
  }).catch(function(e){
    console.error('Error cargando historial:',e);
    cont.innerHTML='<p style="color:var(--crit);font-size:.82rem">No se pudo cargar el historial.</p>';
  });
}

function verInformeGuardado(id){
  agDbGet(id).then(function(r){
    if(!r)return;
    _ultimoInformeId=id;
    document.getElementById('modalTitulo').textContent='Informe · '+r.sucursal+' · '+fmtFecha(r.fecha);
    document.getElementById('informeFrame').srcdoc=r.html;
    document.getElementById('modalDetalle').classList.add('open');
  });
}

function descargarInformeGuardado(){
  if(!_ultimoInformeId)return;
  agDbGet(_ultimoInformeId).then(function(r){
    if(!r)return;
    var blob=new Blob([r.html],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='Autoevaluacion_'+r.sucursal.replace(/ /g,'_')+'_'+r.fecha+'.html';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
  });
}

function cerrarModal(){
  document.getElementById('modalDetalle').classList.remove('open');
  document.getElementById('informeFrame').srcdoc='';
  _ultimoInformeId=null;
}

    H+='</tr></thead><tbody>';
    todasGestiones.forEach(function(g){
      H+='<tr style="background:#EDE9FE;border-bottom:1px solid #DDD">';
      H+='<td style="padding:3px 8px;font-size:8px;font-weight:600;color:#4C1D95">'+g.icon+' '+g.area+'</td>';
      H+='<td style="padding:3px 8px;font-size:8px;color:#7C3AED;font-weight:700">🔄 '+g.txt+'</td>';
      H+='<td style="padding:3px 8px;font-size:8px;color:#555">'+(g.solQuien||'—')+'</td>';
      H+='<td style="padding:3px 8px;font-size:8px;color:#555">'+(g.solCuando?fmtFecha(g.solCuando):'—')+'</td>';
      H+='<td style="padding:3px 8px;font-size:8px;color:#555">'+(g.solMedio||'—')+'</td>';
      H+='</tr>';
    });
    H+='</tbody></table>';
  }

  // PIE
  H+='<div style="margin-top:14px;padding:8px 12px;background:#F4F6FA;border-top:2px solid #003366;border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:8px;color:#666">';
  H+='<div><img src="'+LOGO+'" style="height:28px;width:auto;display:block;margin-bottom:3px" alt="Cruz Nacional"><span>Autogestión de Calidad en Sucursal · Uso interno</span></div>';
  H+='<span style="text-align:right;color:#003366;font-weight:700">'+nombre+'<br><span style="font-weight:400;color:#666">Evaluador/a · '+sucursal+'</span></span>';
  H+='</div>';
  H+='</div></body></html>';

  return {html:H,pct:pGlobal,totalC:totalC,totalN:totalN,totalS:totalS};
}
